<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Amit Saini Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

h1 {
    margin-top: 30px;
    font-size: 40px;
    color: #00ffd5;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    width: 220px;
}

a {
    display: block;
    margin: 10px 0;
    padding: 10px;
    background: #00ffd5;
    color: black;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>✨ Welcome to Amit Saini</h1>

<div class="container">
<div class="card">
<h3>🌐 My Pages</h3>

<div id="links"></div>

</div>
</div>

<script>
let defaultPages = [
    {name: "Mandola Resorts", file: "index.html"},
    {name: "सन शाइन पब्लिक", file: "hotel.html"},
    {name: "लिटिल एंजल्स", file: "school.html"},
    {name: "Shaurya Inn", file: "team.html"},
    {name: "Little Angels", file: "Little.html"},
    {name: "Hotel Ram Bhawan", file: "mk.html"}
];

let saved = JSON.parse(localStorage.getItem("pages"));

if(!saved){
    let setup = defaultPages.map(p => ({...p, enabled: true}));
    localStorage.setItem("pages", JSON.stringify(setup));
    saved = setup;
}

let container = document.getElementById("links");

saved.forEach(p => {
    if(p.enabled){
        let a = document.createElement("a");
        a.href = p.file;
        a.innerText = p.name;
        container.appendChild(a);
    }
});
</script>

</body>
</html>
